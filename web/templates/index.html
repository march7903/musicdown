{% extends 'base.html' %}
{% block title %}Music Downloader{% endblock %}
{% block content %}
<h1>Music Downloader</h1>
<form action="/search" method="get" class="search-form">
    <input type="text" name="q" placeholder="Search song" required>
    <button type="submit">Search</button>
</form>
{% if use_light_mode %}
<p class="info">轻量下载模式已启用，文件将由浏览器直接下载。</p>
{% endif %}
<p><a href="/login">重新登录</a></p>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Music Downloader{% endblock %}
{% block header %}
<h1><i class="fas fa-music"></i> Music Downloader</h1>
{% endblock %}

{% block content %}
<div class="card">
    <form action="/search" method="get" class="search-form">
        <input type="text" name="q" placeholder="搜索歌曲、歌手或专辑..." required>
        <button type="submit"><i class="fas fa-search"></i> 搜索</button>
        </form>
    
    {% if use_light_mode %}
    <div class="info">
        <i class="fas fa-info-circle"></i> 轻量下载模式已启用，文件将由浏览器直接下载。
    </div>
    {% endif %}
    <div style="text-align: center; margin-top: 30px;">
        <p style="margin-bottom: 15px;">登录状态：已登录</p>
        <a href="/login" class="button"><i class="fas fa-sign-in-alt"></i> 重新登录</a>
    </div>
    </div>
{% endblock %}

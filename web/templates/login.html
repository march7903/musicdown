{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<h1>扫码登录 QQ 音乐</h1>
<img src="/login/qrcode" alt="QR Code">
<p>请使用手机 QQ 或微信扫描二维码登录。</p>
<script>
    async function checkStatus() {
        const res = await fetch('/login/status');
        const data = await res.json();
        if (data.status === 'success') {
            window.location = '/';
        } else if (data.status === 'timeout' || data.status === 'refused') {
            location.reload();
        }
    }
    setInterval(checkStatus, 3000);
</script>
{% endblock %}

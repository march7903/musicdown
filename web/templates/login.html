{% extends 'base.html' %}
{% block title %}登录 - Music Downloader{% endblock %}

{% block header %}
<h1><i class="fas fa-sign-in-alt"></i> 扫码登录 QQ 音乐</h1>
{% endblock %}

{% block content %}
<div class="card login-container">
    <div class="qr-code-container">
        <img src="/login/qrcode" alt="QR Code" style="max-width: 100%; height: auto;">
    </div>

    <p class="login-status" id="statusText">
        <i class="fas fa-spinner fa-spin"></i> 请使用手机 QQ 或微信扫描二维码登录
    </p>

    <div style="margin-top: 20px;">
        <a href="/" class="nav-link"><i class="fas fa-arrow-left"></i> 返回首页</a>
    </div>
</div>

<script>
            const statusEl = document.getElementById('statusText');
        
    async function checkStatus() {
        try {
            const res = await fetch('/login/status');
            const data = await res.json();

            // 更新状态文本和图标
            if (data.status === 'waiting_scan') {
                statusEl.innerHTML = '<i class="fas fa-qrcode"></i> 请扫描二维码';
            } else if (data.status === 'waiting_confirm') {
                statusEl.innerHTML = '<i class="fas fa-clock"></i> 请在手机上确认登录';
            } else if (data.status === 'success') {
                statusEl.innerHTML = '<i class="fas fa-check-circle"></i> 登录成功，正在跳转...';
                setTimeout(() => window.location = '/', 1000);
            } else if (data.status === 'timeout') {
                statusEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 登录超时，请刷新页面重试';
                setTimeout(() => location.reload(), 3000);
            } else if (data.status === 'refused') {
                statusEl.innerHTML = '<i class="fas fa-times-circle"></i> 登录被拒绝，请刷新页面重试';
                setTimeout(() => location.reload(), 3000);
            } else if (data.status === 'error') {
                statusEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> 登录发生错误，请刷新页面重试';
            }
        } catch (error) {
            console.error("Error checking login status:", error);
        }
    }

    // 初次检查状态
    checkStatus();

    // 定期检查状态
    setInterval(checkStatus, 3000);
</script>
{% endblock %}
